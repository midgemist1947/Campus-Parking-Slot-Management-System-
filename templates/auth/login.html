{% extends 'base.html' %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-icon">🅿️</div>
            <h1>Campus Parking</h1>
            <p class="auth-subtitle">Sign in to manage your parking</p>
        </div>
        <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form" id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@campus.edu" autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
        </form>
        <div class="auth-footer">
            <p>Accounts are managed by administrators.<br>Contact admin if you need access.</p>
        </div>
    </div>
</div>
{% endblock %}
